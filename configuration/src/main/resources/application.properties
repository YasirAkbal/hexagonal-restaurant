spring.application.name=configuration
spring.main.web-application-type=servlet

spring.kafka.listener.auto-startup=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=OrderPlacedIntegrationEvent:com.yasirakbal.shared.events.OrderPlacedIntegrationEvent,OrderCancelledIntegrationEvent:com.yasirakbal.shared.events.OrderCancelledIntegrationEvent,OrderPlacedLineItem:com.yasirakbal.shared.events.OrderPlacedLineItem,TableOrderDeliveredIntegrationEvent:com.yasirakbal.shared.events.TableOrderDeliveredIntegrationEvent,KitchenOrderReadyIntegrationEvent:com.yasirakbal.shared.events.KitchenOrderReadyIntegrationEvent

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true

order.kafka.topics.order-placed=order.order.placed
order.kafka.topics.order-cancelled=order.order.cancelled
order.kafka.topics.kitchen-order-ready=kitchen.order.ready
order.kafka.topics.table-order-delivered=table.order.delivered

kitchen.kafka.consumer.group-id=kitchen-group
kitchen.kafka.topics.order-placed=order.order.placed
kitchen.kafka.topics.order-cancelled=order.order.cancelled
kitchen.kafka.topics.kitchen-order-ready=kitchen.order.ready

table.kafka.topics.table-order-delivered=table.order.delivered

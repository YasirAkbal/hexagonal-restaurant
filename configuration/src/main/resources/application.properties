spring.application.name=configuration
spring.main.web-application-type=servlet

# Kafka (order module listeners); order/src/main/resources/application.yml is not on the classpath here.
# Off by default so the app runs without a broker; enable with profile "kafka" or spring.kafka.listener.auto-startup=true.
spring.kafka.listener.auto-startup=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.consumer.properties.spring.json.type.mapping=TableOrderDeliveredIntegrationEvent:com.yasirakbal.shared.events.TableOrderDeliveredIntegrationEvent,KitchenOrderReadyIntegrationEvent:com.yasirakbal.shared.events.KitchenOrderReadyIntegrationEvent

order.kafka.topics.kitchen-order-ready=kitchen-order-ready
order.kafka.topics.table-order-delivered=table-order-delivered
